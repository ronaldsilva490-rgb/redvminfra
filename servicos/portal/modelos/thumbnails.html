<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thumbnail Generator</title>
<style>
body { background: #1a1a1a; padding: 20px; font-family: sans-serif; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.thumb-container { 
  background: #2a2a2a; 
  border-radius: 8px; 
  overflow: hidden;
  position: relative;
}
.thumb-label {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 8px;
  font-size: 12px;
  text-align: center;
}
iframe {
  width: 100%;
  height: 400px;
  border: none;
  transform: scale(0.5);
  transform-origin: 0 0;
  width: 200%;
  height: 800px;
}
</style>
</head>
<body>
<h1 style="color:white;">Thumbnail Generator - Click each to focus</h1>
<div class="grid">

  <div class="thumb-container" id="01-editorial">
    <iframe src="empresarial/modelo-1-editorial.html"></iframe>
    <div class="thumb-label">01-editorial</div>
  </div>

  <div class="thumb-container" id="02-esmeralda">
    <iframe src="empresarial/modelo-2-esmeralda.html"></iframe>
    <div class="thumb-label">02-esmeralda</div>
  </div>

  <div class="thumb-container" id="03-brutalist">
    <iframe src="empresarial/modelo-3-brutalist.html"></iframe>

  </div>

  <div class="thumb-container" id="11-neumorphism">

</div>
</body>
</html>
