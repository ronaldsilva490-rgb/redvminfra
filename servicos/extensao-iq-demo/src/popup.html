<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>RED IQ Demo Vision</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        width: 320px;
        background: #0b1018;
        color: #f8fafc;
        font: 13px/1.4 Inter, Segoe UI, Arial, sans-serif;
      }
      .wrap {
        padding: 14px;
      }
      .title {
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 10px;
      }
      .card {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 10px;
      }
      .label {
        display: block;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: .08em;
        color: #94a3b8;
        margin-bottom: 4px;
      }
      .value {
        font-weight: 600;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      button, select {
        width: 100%;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.1);
        background: #131a24;
        color: #fff;
        padding: 9px 10px;
        font: inherit;
      }
      button {
        cursor: pointer;
      }
      .ok {
        color: #86efac;
      }
      .warn {
        color: #fda4af;
      }
      .muted {
        color: #cbd5e1;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">RED IQ Demo Vision</div>
      <div class="card">
        <span class="label">Modo detectado</span>
        <div class="value" id="mode">-</div>
      </div>
      <div class="card">
        <span class="label">Ativo</span>
        <div class="value" id="asset">-</div>
        <div class="row">
          <div style="flex:1">
            <span class="label">Mercado</span>
            <div class="value" id="market">-</div>
          </div>
          <div style="flex:1">
            <span class="label">Preço</span>
            <div class="value" id="price">-</div>
          </div>
        </div>
      </div>
      <div class="card">
        <span class="label">Frequência</span>
        <select id="sample-interval">
          <option value="150">150 ms</option>
          <option value="250">250 ms</option>
          <option value="400">400 ms</option>
          <option value="750">750 ms</option>
        </select>
        <div class="row">
          <button id="toggle-enabled">Pausar overlay</button>
        </div>
      </div>
      <div class="card">
        <span class="label">Bridge da VM</span>
        <div class="value" id="bridge-status">-</div>
        <div class="muted" id="bridge-detail" style="margin-top:6px">Sem telemetria ainda.</div>
      </div>
      <div class="muted" id="hint">Abrindo snapshot...</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
