<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RED Trader</title>
    <link rel="icon" href="favicon.ico" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #06090d;
        --panel: #0d141c;
        --panel-2: #121b25;
        --text: #f3f7fb;
        --muted: #91a1b2;
        --red: #e31b23;
        --red-2: #9f1017;
        --line: #203040;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(145deg, rgba(227, 27, 35, 0.18), transparent 34rem),
          radial-gradient(circle at 70% 12%, rgba(227, 27, 35, 0.16), transparent 25rem),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(92vw, 430px);
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(18, 27, 37, 0.98), rgba(10, 15, 22, 0.98));
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      }
      img { width: 120px; height: auto; display: block; margin-bottom: 26px; }
      h1 { margin: 0 0 10px; font-size: 32px; line-height: 1.1; }
      p { margin: 0 0 24px; color: var(--muted); line-height: 1.5; }
      label { display: block; color: #c7d4e1; margin-bottom: 8px; font-size: 14px; }
      input, button {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--line);
        font: inherit;
      }
      input {
        background: #071019;
        color: var(--text);
        padding: 14px 16px;
        outline: none;
      }
      input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(227, 27, 35, 0.18); }
      button {
        margin-top: 16px;
        padding: 14px 16px;
        cursor: pointer;
        border: 0;
        color: white;
        font-weight: 800;
        background: linear-gradient(180deg, var(--red), var(--red-2));
      }
      .error { min-height: 22px; margin-top: 14px; color: #ff9aa0; font-size: 14px; }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="assets/logo.png" alt="RED" />
      <h1>RED Trader</h1>
      <p>Paper trading com dados reais, IA no comitê de risco e relatório vivo.</p>
      <form id="loginForm">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus />
        <button type="submit">Entrar</button>
        <div id="error" class="error" aria-live="polite"></div>
      </form>
    </main>
    <script>
      const form = document.querySelector("#loginForm");
      const error = document.querySelector("#error");
      const basePath = location.pathname === "/trader" || location.pathname.startsWith("/trader/") ? "/trader" : "";
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";
        const button = form.querySelector("button");
        button.disabled = true;
        button.textContent = "Entrando...";
        try {
          const response = await fetch(`${basePath}/api/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: form.password.value }),
          });
          if (!response.ok) throw new Error("Senha invalida");
          location.href = basePath ? `${basePath}/` : "/";
        } catch (err) {
          error.textContent = err.message || "Falha ao entrar";
        } finally {
          button.disabled = false;
          button.textContent = "Entrar";
        }
      });
    </script>
  </body>
</html>
