# Include usado dentro do server :80 principal da VM redsystems.
# Portal RED em / e atalhos públicos sem porta.

location = /dashboard {
    return 301 /dashboard/;
}

location = / {
    root /var/www/red-portal;
    try_files /index.html =404;
}

location /portal-assets/ {
    alias /var/www/red-portal/assets/;
}

location /dashboard/ {
    proxy_pass http://127.0.0.1:9001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /dashboard;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
}

location /hooks/ {
    proxy_pass http://127.0.0.1:9001/hooks/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
}

