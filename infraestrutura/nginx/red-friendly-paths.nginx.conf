# Include usado dentro do server :80 principal da VM redsystems.
# Mantém o dashboard RED em / e adiciona atalhos públicos sem porta.

location = /dashboard {
    return 302 /;
}

location = /dashboard/ {
    return 302 /;
}

location = /trader {
    return 301 /trader/;
}

location /trader/ {
    proxy_pass http://redsystems2.ddns.net:3100/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /trader;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
}
